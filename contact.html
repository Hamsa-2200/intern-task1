<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Internship Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MySite</a>
    <div>
      <a class="nav-link d-inline text-white" href="index.html">Home</a>
      <a class="nav-link d-inline text-white" href="about.html">About</a>
      <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- Contact Form -->
<div class="container mt-5">
  <h2 class="text-center mb-4">Contact Us</h2>

  <form>
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="Enter your name">
    </div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control" placeholder="Enter your email">
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" rows="4" placeholder="Type your message"></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">Send Message</button>
  </form>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2026 My Internship Project
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
